<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Al-Farha Cargo</title>
  
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">

  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0; padding: 0; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
      color: white; font-family: 'Lexend', sans-serif;
    }
    .loader {
      border: 4px solid rgba(255,255,255,0.2); border-top-color: white;
      border-radius: 50%; width: 40px; height: 40px;
      animation: spin 1s linear infinite; margin-top: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1 style="margin:0; font-size: 2rem;">Al-Farha Cargo</h1>
  <p style="opacity: 0.8; margin-top: 5px;">Loading System...</p>
  <div class="loader"></div>

  <script>
    // PWA: SERVICE WORKER REGISTRATION
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => console.log('ServiceWorker registered'))
          .catch(err => console.log('ServiceWorker registration failed: ', err));
      });
    }

    // ROUTING LOGIC
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        const sessionUser = localStorage.getItem('afc_user');
        
        if (sessionUser) {
          // User is logged in -> Route to dashboard based on device width
          if (window.innerWidth <= 900) {
            window.location.href = '/mobiledashboard.html';
          } else {
            window.location.href = '/dashboard.html';
          }
        } else {
          // No user -> Route to Login page
          window.location.href = '/login.html';
        }
      }, 800); // Slight delay to show the splash screen gracefully
    });
  </script>
</body>
</html>
